<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Creation</title>
</head>
<body>
    <h2>TABLE CREATION</h2>
    <table border="1" cellpadding="20PX" cellspacing="5px">
        <tr>
            <th>Name</th>
            <th colspan="2">Age</th>
            <!-- <th>City</th> -->
        </tr>
        <tr>
            <td rowspan="2">abc</td>
            <td>20</td>
            <td>Pune</td>
        </tr>
        <tr>
            <!-- <td>xyz</td> -->
            <td>25</td>
            <td>Mumbai</td>
        </tr>
    </table>
</body>
</html>
