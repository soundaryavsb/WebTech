<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //For loop Example 1:
        for(let i=0;i<=10;i++)
        {
            console.log(i)
        }
        //For loop Example 2:
        for(let m=45;m<49;m++)
        {
            console.log(m)
        }
        //While loop Example 1:
        let m=50;
        while(m<=55)
        {
            console.log(m)
            m++;
        }
        //While loop Example 2:
        let n=33;
        while(n<35)
        {
            console.log(n)
            n++;
        }
        //Do While loop Example 1:
        let a=100;
        do{
            console.log(a)
            a++;
        }while(a<50)
        //Do While loop Example 2:
        let b=200
        do{
            console.log(b)
            b++
        }while(b<=204)
    </script>
</body>
</html>
