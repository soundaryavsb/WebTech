<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Primitive datatype
        //String
        let a="Ayra"
        console.log(a)
        console.log(typeof a)

        //number
        let b=10
        console.log(b)
        console.log(typeof b)

        //boolean
        let c=false
        console.log(c)
        console.log(typeof c)

        //bigint
        let d=100n
        console.log(d)
        console.log(typeof d)

        // undefined
        let e=undefined
        console.log(e)
        console.log(typeof e)

        //null
        let f=null
        console.log(f)
        console.log(typeof f)

        //symbol
        let g=Symbol()
        console.log(g)
        console.log(typeof g)

        //Non-primitive datatype
        //array
        let arr=[10,20,30,40,50]
        console.log(arr)
        console.log(typeof arr)
        
        //object
        let obj={
            name:"Arya",
            age:28,
            job:"CEO"
        }
        console.log(obj)
        console.log(typeof obj)
    </script>
</body>
</html>
