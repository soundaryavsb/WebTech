<body>
    <!-- Ordered List -->
     <ol type="A" start="5" reversed>
        <li>HTML</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TS</li>
        <li>PW</li>
     </ol>
     <!-- Unordered List -->
      <ul type="square"> 
        <li>HTML</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TS</li>
        <li>PW</li>
     </ul>
     <!-- Note: Unorder list type="null"/"circle"/"square", default:dart -->

      <dl>
