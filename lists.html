<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST CREATION</title>
</head>
<body>
    
    <!--! ORDERED LIST -->

    <ol type="1" start="5" reversed>
        <li>HTML</li>
        <li>CSS</li>
        <li>JS</li>
        <li>TS</li>
        <li>PW</li>
    </ol>


    <!-- ! UNORDERED LIST -->
    
    <ul type="none" >
        <li>car</li>
        <li>bike</li>
        <li>flowers</li>
    </ul>


    <!-- ! DESCRIPTION LIST -->

    <dl>
        <dt>HTML</dt>
        <dd>html is used to give structure</dd>
        <dt>HTML</dt>
        <dd>html is used to give structure</dd>
    </dl>

    <!-- !NESTED LIST -->

    <ol>
        <li>abc</li>
        <ul>
            <li>gfghtyj</li>
            <dl>
                <dt>fhyj</dt>
                <dd>thmnbvcxjhresa</dd>
            </dl>
        </ul>
    </ol>
