<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //IF condition
        let m=200
        let n=100
        //If example 1:
        if(m+n==500)
        {
            console.log("Hello Guys, Good morning")
        }
        //If example 2:
        if(m+n==300)
        {
            console.log("Hi Guys, Good Night")
        }
        //If Else condition
        let a=80
        let b=50
        //If Else example 1:
        if(a+b>100)
        {
            console.log("Hello World")
        }
        else
        {
            console.log("Buy, World")
        }
        //If Else example 2:
        if(a+b==200)
        {
            console.log("Hello Raju!")
        }
        else{
            console.log("Buy Buy Raju!")
        }
        //If Else Ladder
        let x=200
        let y=100
        //If Else ladder example 1:
        if(x+y==500){
            console.log("I am IF block")
        }
        else if(x+y>200){
            console.log("I am IF ELSE block")
        }
        else{
            console.log("I am ELSE block")
        }
        //If Else ladder example 2:
        x=200
        y=100
        if(x+y!=200){
            console.log("I am IF block")
        }
        else if(x+y<100){
            console.log("I am IF ELSE block")
        }
        else{
            console.log("I am ELSE block")
        }
        //If Else ladder example 3:
        x=200
        y=100
        if(x+y==100){
            console.log("I am IF block")
        }
        else if(x+y<100){
            console.log("I am IF ELSE block")
        }
        else{
            console.log("I am ELSE block")
        }
        //Switch Case
        let day=5;
        let dayName;
        //Switch case example 1:
        switch(day){
            case 1:
                dayName="Monday"
                break;
            case 2:
                dayName="Tuesday"
                break;
            case 3:
                dayName="Wednesday"
                break;
            case 4:
                dayName="Thursday"
                break;
            case 5:
                dayName="Friday"
                break;
            case 6:
                dayName="Saturday"
                break;
            case 7:
                dayName="Sunday"
                break;
            default:
                dayName="Invalid Day"
        }
        console.log(dayName);
        //Switch case example 2:
        day=10;
        switch(day){
            case 1:
                dayName="Monday"
                break;
            case 2:
                dayName="Tuesday"
                break;
            case 3:
                dayName="Wednesday"
                break;
            case 4:
                dayName="Thursday"
                break;
            case 5:
                dayName="Friday"
                break;
            case 6:
                dayName="Saturday"
                break;
            case 7:
                dayName="Sunday"
                break;
            default:
                dayName="Invalid Day"
        }
        console.log(dayName);
    </script>
</body>
</html>
